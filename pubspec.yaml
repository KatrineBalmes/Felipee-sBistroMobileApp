name: filipees_bistro
description: "Filipee's Bistro — Landing Page, POS & Inventory Management (Flutter)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1        # local SQLite persistence (mirrors the original desktop schema)
  path: ^1.9.0
  intl: ^0.19.0             # currency / date formatting
  url_launcher: ^6.3.1      # open Facebook / Instagram / dialer / maps
  fl_chart: ^0.68.0         # sales monitor + AI forecast charts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpg
    - assets/images/promo_poster.jpg
    - assets/images/gallery_1.jpg
    - assets/images/gallery_2.jpg
    - assets/images/gallery_3.jpg
    - assets/images/gallery_4.jpg
    - assets/images/gallery_5.jpg
    - assets/images/shop.jpg
    - assets/images/sprite.jpg
    - assets/images/coke.jpg
